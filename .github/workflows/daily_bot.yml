name: daily_bot

on:
  schedule:
    - cron: "*/5 * * * *"
      timezone: "Asia/Seoul"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests beautifulsoup4 google-generativeai google-auth google-api-python-client lxml

      - name: Check configuration
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          date
          test -f src/main.py || {
            echo "::error::src/main.py 파일을 찾을 수 없습니다."
            exit 1
          }

          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::GEMINI_API_KEY secret이 설정되지 않았습니다."
            exit 1
          fi

          if [ -z "$GCP_CREDENTIALS" ]; then
            echo "::error::GCP_CREDENTIALS secret이 설정되지 않았습니다."
            exit 1
          fi

      - name: Run Python Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          python src/main.py
