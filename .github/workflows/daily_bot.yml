name: Smartphone Insight Automation Bot

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest
    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v4

    - name: 파이썬 환경 세팅하기
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필수 라이브러리 설치하기 (lxml 돋보기 추가!)
      run: |
        pip install requests beautifulsoup4 lxml google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client google-generativeai

    - name: 자동화 엔진 가동
      env:
        TZ: "Asia/Seoul"
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      run: |
        python src/main.py
