name: Smartphone Insight Automation Bot

on:
  schedule:
    - cron: '30 22 * * *' # UTC 기준 22시 30분 = 한국 시간 오전 7시 30분
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest
    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v4

    - name: 파이썬 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필수 라이브러리 설치
      run: |
        pip install requests beautifulsoup4 lxml google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client google-generativeai

    - name: 자동화 엔진 가동
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      run: |
        python src/main.py
