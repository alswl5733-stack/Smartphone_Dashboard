name: daily_bot

on:
  schedule:
    # 영국 시간 밤 11시 = 한국 시간 오전 8시 정각 자동 실행
    - cron: '15 1 * * *'
  workflow_dispatch: # 직접 실행 버튼 활성화

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 💡 requirements.txt 파일 없이 다이렉트로 필요한 패키지를 설치합니다.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 google-generativeai google-auth google-api-python-client lxml

      # 💡 main.py가 src 폴더 안에 있다면 아래처럼 경로를 지정해 줍니다.
      # 만약 폴더 없이 메인에 있다면 python main.py 로 수정해 주세요.
      - name: Run Python Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          python src/main.py
