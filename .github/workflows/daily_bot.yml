name: Smartphone Insight Automation Bot

on:
  schedule:
    # 매일 아침 8시(한국 시간)에 자동으로 엔진을 깨웁니다. (UTC 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest
    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v4

    - name: 파이썬 환경 세팅하기
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필수 라이브러리 설치하기
      run: |
        pip install requests beautifulsoup4 google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client openai

    - name: 자동화 엔진 가동 (데이터 수집 ➡️ 분석 ➡️ 대시보드 갱신)
      env:
        # 시간대를 한국 시간으로 강제 고정합니다.
        TZ: "Asia/Seoul"
        # 깃허브 금고(Secrets)에서 출입증을 꺼내 파이썬 로봇에게 전달합니다.
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      run: |
        python src/main.py
