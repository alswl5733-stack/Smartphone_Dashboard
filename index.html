        function formatDetailContent(rawText) {
            if (!rawText) return "м†Хл≥і мЧЖмЭМ";
            
            // нКємИШлђЄмЮР л≥ДнСЬ(*)л•Љ кєГнЧИлЄМк∞А нКЄмІСмЮ°мІА мХКк≤М split/joinмЬЉл°Ь мХИм†ДнХШк≤М кµРм≤і
            let clean = rawText.split('**').join('').split('*').join('вАҐ').trim();
            let lines = clean.split('вАҐ');
            let htmlResult = "";
            
            lines.forEach(line => {
                let trimmed = line.trim();
                if (!trimmed) return;
                
                if (trimmed.includes(':')) {
                    let parts = trimmed.split(':');
                    let subTitle = parts[0].trim();
                    parts.shift(); // м≤Ђ л≤ИмІЄ мЪФмЖМ(м†Ьл™©) м†Ьк±∞
                    let subContent = parts.join(':').trim(); // лВШл®ЄмІАл•Љ лЛ§мЛЬ нХ©мє®
                    
                    htmlResult += '<div class="sub-item-block"><div class="sub-title-tag">' + subTitle + '</div><div class="sub-body-text">' + subContent + '</div></div>';
                } else {
                    htmlResult += '<div class="sub-item-block"><div class="sub-body-text">' + trimmed + '</div></div>';
                }
            });
            
            return htmlResult;
        }
        // рЯТ° [кєГнЧИлЄМ мЧРлЯђ л∞©мІА] кіДнШЄ(USP)мЩА м†ХкЈЬмЛЭ мЩДм†Д м†Ьк±∞. мШ§мІБ indexOfлІМ мВђмЪ©
        function parseStrategy(text) {
            const extract = (startKey, endKey) => {
                let startIdx = text.indexOf(startKey);
                if (startIdx === -1) return "";
                
                let colonIdx = text.indexOf(":", startIdx);
                if (colonIdx === -1) colonIdx = startIdx + startKey.length;
                
                let contentStart = colonIdx + 1;
                let contentEnd = endKey ? text.indexOf(endKey, contentStart) : text.length;
                
                if (contentEnd === -1) contentEnd = text.length;
                return text.substring(contentStart, contentEnd).trim();
            };
            
            // кіДнШЄ мЧЖмЭі нХµмЛђ лЛ®мЦілІМмЬЉл°Ь мЬ†мЧ∞нХШк≤М мґФмґЬ

            let uspStr = extract("нХµмЛђ мЕАлІБ нПђмЭЄнКЄ", "к∞Ак≤©лМА л∞П нПђмІАмЕФлЛЭ");
