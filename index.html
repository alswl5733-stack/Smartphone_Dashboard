<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트폰 신제품 인사이트 대시보드</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary: #0f172a;
            --accent: #0284c7;
            --insight-bg: #f0f9ff;
            --insight-border: #bae6fd;
            --text-main: #334155;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --tab-bg: #e2e8f0;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 30px 20px;
            line-height: 1.7;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            font-size: 2.4rem;
            color: var(--primary);
            margin: 0 0 10px 0;
            letter-spacing: -1px;
            font-weight: 800;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin: 0;
        }

        .tab-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            gap: 12px;
        }

        .tab-btn {
            background-color: var(--tab-bg);
            color: var(--text-muted);
            border: none;
            padding: 12px 28px;
            font-size: 1.05rem;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn:hover { background-color: #cbd5e1; }
        .tab-btn.active {
            background-color: var(--accent);
            color: white;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3);
        }

        .filter-container {
            display: none; 
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 35px;
            gap: 10px;
        }

        .filter-btn {
            background-color: white;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 35px;
        }
