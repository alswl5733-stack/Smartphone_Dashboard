<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트폰 신제품 인사이트 대시보드</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary: #2c3e50;
            --accent: #3498db;
            --insight-bg: #e8f4fd;
            --text-main: #333333;
            --text-muted: #7f8c8d;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px 0;
        }

        .header h1 {
            font-size: 2.2rem;
            color: var(--primary);
            margin: 0 0 10px 0;
            letter-spacing: -1px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin: 0;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }

        .device-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 24px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .device-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .tier-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            color: white;
            margin-bottom: 12px;
            align-self: flex-start;
        }

        .tier-flagship { background-color: #ff4757; }
        .tier-midrange { background-color: #2ed573; }
        .tier-budget { background-color: #1e90ff; }

        .device-title {
            font-size: 1.4rem;
            font-weight: 800;
            margin: 0 0 15px 0;
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .device-title a {
            color: var(--accent);
            font-size: 1rem;
            text-decoration: none;
        }

        .insight-box {
            background-color: var(--insight-bg);
            border-left: 4px solid var(--accent);
            padding: 15px;
            border-radius: 4px 8px 8px 4px;
            margin-bottom: 20px;
        }

        .insight-box strong {
            display: block;
            color: var(--accent);
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .insight-box p {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--primary);
        }

        .detail-section {
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .detail-section strong {
            color: var(--primary);
            display: block;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
            color: var(--text-muted);
        }

        .loading {
            text-align: center;
            grid-column: 1 / -1;
            font-size: 1.2rem;
            color: var(--text-muted);
            padding: 50px;
        }

        #update-date {
            font-weight: bold;
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚀 최근 공개 & 출시 임박 스마트폰 라인업</h1>
        <p>수집 기준일: <span id="update-date">불러오는 중...</span> (가장 최근 데이터 기준 정렬)</p>
    </div>

    <div class="dashboard-container" id="dashboard">
        <div class="loading"><i class="fas fa-spinner fa-spin"></i> 구글 시트에서 최신 전략 데이터를 불러오고 있습니다...</div>
    </div>

    <script>
        // 구글 시트 ID 및 설정
        const SHEET_ID = '1fKrSktMeXJmnqwUGOgk4QLtwfpAlkkFi5SvYJSrbT5o';
        const SHEET_NAME = '스펙_누적_데이터';
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

        // 파이썬에서 생성한 텍스트를 항목별로 파싱하는 정규식 함수
        function parseStrategy(text) {
            const extract = (startWord, endWord) => {
                let regex;
                if (endWord) {
                    regex = new RegExp(startWord + "\\s*:\\s*([\\s\\S]*?)(?=" + endWord + ":|$)");
                } else {
                    regex = new RegExp(startWord + "\\s*:\\s*([\\s\\S]*)");
                }
                const match = text.match(regex);
                return match ? match[1].trim() : "정보 없음";
            };

            return {
                maker: extract("제조사", "모델명"),
                target: extract("주요 타겟 고객층", "핵심 셀링 포인트\\(USP\\)"),
                usp: extract("핵심 셀링 포인트\\(USP\\)", "가격대 및 포지셔닝"),
                price: extract("가격대 및 포지셔닝", "제품 인사이트 요약\\(1줄\\)"),
                insight: extract("제품 인사이트 요약\\(1줄\\)", null)
            };
        }

        // 포지셔닝 텍스트를 기반으로 티어(플래그십/중급/보급) 자동 분류
        function getTierInfo(priceText, targetText) {
            const combined = (priceText + " " + targetText).toLowerCase();
            if (combined.includes('플래그십') || combined.includes('프리미엄') || combined.includes('최고급') || combined.includes('flagship') || combined.includes('premium')) {
                return { class: 'tier-flagship', label: '🌟 플래그십', rank: 1 };
            } else if (combined.includes('중급') || combined.includes('미드') || combined.includes('메인스트림') || combined.includes('mid')) {
                return { class: 'tier-midrange', label: '⚖️ 중급형', rank: 2 };
            } else {
                return { class: 'tier-budget', label: '📱 보급형 / 기타', rank: 3 };
            }
        }

        // 데이터 Fetch 및 렌더링
        fetch(URL)
            .then(res => res.text())
            .then(text => {
                // 구글 gviz json 형태로 변환
                const jsonStr = text.substring(47).slice(0, -2);
                const json = JSON.parse(jsonStr);
                const rows = json.table.rows;

                let products = [];
                let latestDate = "";

                // 행 데이터 추출
                rows.forEach(row => {
                    if (!row.c[0] || !row.c[2] || !row.c[3]) return;
                    
                    const dateStr = row.c[0].v; // A열: 날짜
                    const modelName = row.c[2].v; // C열: 모델명
                    const strategyText = row.c[3].v; // D열: 분석 텍스트
                    const newsUrl = row.c[4] ? row.c[4].v : '#'; // E열: URL

                    // 가장 최근 날짜 찾기
                    if (dateStr > latestDate) latestDate = dateStr;

                    const details = parseStrategy(strategyText);
                    const tier = getTierInfo(details.price, details.target);

                    products.push({
                        date: dateStr,
                        modelName: modelName,
                        url: newsUrl,
                        ...details,
                        tier: tier
                    });
                });

                // 1. 가장 최신 날짜의 데이터만 필터링 (당일 수집 정보)
                let latestProducts = products.filter(p => p.date === latestDate);

                // 2. 티어 랭크 기준 오름차순 정렬 (플래그십이 무조건 먼저 오도록)
                latestProducts.sort((a, b) => a.tier.rank - b.tier.rank);

                // 화면 업데이트
                document.getElementById('update-date').innerText = latestDate;
                const dashboard = document.getElementById('dashboard');
                dashboard.innerHTML = ''; // 로딩 텍스트 제거

                if (latestProducts.length === 0) {
                    dashboard.innerHTML = '<div class="loading">최근 공개된 신제품 데이터가 없습니다.</div>';
                    return;
                }

                // 카드 생성
                latestProducts.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'device-card';
                    card.innerHTML = `
                        <div class="tier-badge ${product.tier.class}">${product.tier.label}</div>
                        <h2 class="device-title">
                            ${product.modelName} 
                            <a href="${product.url}" target="_blank" title="원문 기사 보기"><i class="fas fa-external-link-alt"></i></a>
                        </h2>
                        
                        <div class="insight-box">
                            <strong><i class="fas fa-lightbulb"></i> 제품 인사이트 요약</strong>
                            <p>${product.insight}</p>
                        </div>

                        <div class="detail-section">
                            <strong><i class="fas fa-bullseye"></i> 주요 타겟 고객층</strong>
                            ${product.target}
                        </div>
                        <div class="detail-section">
                            <strong><i class="fas fa-star"></i> 핵심 셀링 포인트 (USP)</strong>
                            ${product.usp}
                        </div>
                        <div class="detail-section">
                            <strong><i class="fas fa-tag"></i> 가격대 및 포지셔닝</strong>
                            ${product.price}
                        </div>
                    `;
                    dashboard.appendChild(card);
                });

            })
            .catch(error => {
                console.error("데이터 로드 실패:", error);
                document.getElementById('dashboard').innerHTML = '<div class="loading" style="color:red;">데이터를 불러오는 중 오류가 발생했습니다. 구글 시트 권한(링크가 있는 모든 사용자 보기)을 확인해주세요.</div>';
            });
    </script>
</body>
</html>
